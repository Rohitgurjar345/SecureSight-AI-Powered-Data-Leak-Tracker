{% extends 'base.html' %}

{% block content %}
<div class="generator-page" style="max-width: 600px; margin: 0 auto;">
    
    <div class="page-header text-center">
        <h1><i class="fa-solid fa-shield-halved"></i> KeyForge Factory</h1>
        <p>Engineered to create unbreakable passwords.</p>
    </div>

    <div class="card scan-card generator-card">
        
        <!-- Generated Output -->
        <div class="form-group pt-20 pb-20">
            <div class="pwd-display-box" style="margin-bottom:0;">
                <input type="text" id="genPwdDisplay" readonly placeholder="Click generate..." style="font-size: 1.2rem; font-family: monospace; text-align: center; letter-spacing: 2px;">
                <button type="button" id="copyPwdBtn" class="btn outline-btn btn-icon" title="Copy"><i class="fa-solid fa-copy"></i></button>
            </div>
            
            <div class="text-center mt-10">
                 <span id="crackTimeEstimate" class="text-sm text-Medium">Estimated generation time: Instant</span>
            </div>
        </div>
        
        <hr style="border-color: var(--border-card); margin-bottom: 20px;">
        
        <!-- Controls -->
        <h4 style="margin-bottom: 15px;">Configuration</h4>
        <div class="gen-controls mb-20" style="flex-direction:column; align-items:stretch;">
            <div style="display:flex; justify-content:space-between; margin-bottom: 10px;">
                <label>Length: <strong id="genLengthVal">16</strong> chars</label>
            </div>
            <input type="range" id="genLength" min="8" max="64" value="16" style="width:100%;">
        </div>
        
        <div class="flex-row gap-10 mb-20" style="flex-wrap:wrap; justify-content:space-between;">
            <label class="custom-checkbox">
                <input type="checkbox" id="chkUpper" checked>
                <span class="checkmark"></span>
                Uppercase (A-Z)
            </label>
            <label class="custom-checkbox">
                <input type="checkbox" id="chkNumbers" checked>
                <span class="checkmark"></span>
                Numbers (0-9)
            </label>
            <label class="custom-checkbox">
                <input type="checkbox" id="chkSymbols" checked>
                <span class="checkmark"></span>
                Symbols (!@#$)
            </label>
        </div>
        
        <button type="button" id="generatePwdBtn" class="btn primary-btn btn-lg animate-pulse" style="background:var(--color-green);">Generate Strong Password</button>
    </div>
</div>
{% endblock %}
